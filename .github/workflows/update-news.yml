name: Update News Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # lets you run it manually with one click

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit updated news.json
        run: |
          git config user.name "Broad Street Bot"
          git config user.email "bot@broadstreetsports.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Update news feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
