name: Update News Feed

on:
  schedule:
    - cron: '0 * * * *'    # every hour for live scores
  workflow_dispatch:         # manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_site.py

      - name: Commit updated data files
        run: |
          git config user.name "Broad Street Bot"
          git config user.email "bot@broadstreetsports.com"
          git add scores.json news.json
          git diff --staged --quiet || git commit -m "Update scores & news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
